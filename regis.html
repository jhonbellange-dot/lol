html<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Successful - Little Haiti FC</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #f4f4f9; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .success-card { 
            max-width: 450px; 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
            text-align: center;
        }
        .icon-circle {
            width: 70px;
            height: 70px;
            background-color: #e6f4ea;
            color: #137333;
            font-size: 35px;
            line-height: 70px;
            border-radius: 50%;
            margin: 0 auto 20px;
        }
        h1 { 
            color: #004d26; 
            margin-bottom: 10px;
            font-size: 1.8em;
        }
        p { 
            color: #555; 
            line-height: 1.5;
            margin-bottom: 25px;
        }
        .btn-home { 
            display: inline-block; 
            background-color: #004d26; 
            color: white; 
            padding: 12px 24px;
            border-radius: 4px;
            text-decoration: none; 
            font-weight: bold; 
            transition: background 0.2s;
        }
        .btn-home:hover { 
            background-color: #00331a; 
        }
    </style>
</head>
<body>

<div class="success-card">
    <div class="icon-circle">✓</div>
    <h1>Successfully Registered!</h1>
    <p>Thank you for signing up for the <strong>Little Haiti FC 2026 Season</strong>. Your information has been securely received.</p>
    <a href="index.html" class="btn-home">Back to Home</a>
</div>

</body>
</html>
